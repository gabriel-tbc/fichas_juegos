<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c0e2a">
<title>Contador de Fichas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #f4ecd8;
    --ink-dim: #c9bfa6;
    --gold: #e8c772;
    --lead: #050302;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--ink);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ============ PAGE BG  (tinted leaded-glass tile + vignette) ============ */
  body {
    background-color: var(--bg-color, #1c0e2a);
    background-image:
      radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.55) 70%, rgba(0,0,0,0.88) 100%),
      var(--bg-tile, none);
    background-size: auto, 160px 160px;
    background-attachment: fixed, fixed;
    transition: background-color 0.6s ease;
  }

  /* ============ TOP BAR ============ */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: max(12px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) 8px max(14px, env(safe-area-inset-left));
    background: linear-gradient(180deg, rgba(8,5,3,0.85), rgba(8,5,3,0.55) 80%, transparent);
    z-index: 10;
  }
  .brand {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    letter-spacing: 0.24em;
    font-size: 12px;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .brand .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    transform: translateY(-2px);
    margin: 0 8px;
    box-shadow: 0 0 6px var(--gold);
  }

  .bg-selector {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bg-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .swatch {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.6);
    cursor: pointer;
    position: relative;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.18),
      inset 0 -4px 8px rgba(0,0,0,0.45),
      0 2px 6px rgba(0,0,0,0.6);
    padding: 0;
  }
  .swatch::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.45), transparent 55%);
    pointer-events: none;
  }
  .swatch.active {
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.18),
      inset 0 -4px 8px rgba(0,0,0,0.45),
      0 0 0 2px var(--gold),
      0 0 14px rgba(232,199,114,0.55);
  }
  .swatch[data-style="amethyst"] { background: radial-gradient(circle at 40% 35%, #b07ad8, #5a2a8a 55%, #2c0f4a 100%); }
  .swatch[data-style="sapphire"] { background: radial-gradient(circle at 40% 35%, #6fb6f0, #1f5fb8 55%, #0b285c 100%); }
  .swatch[data-style="ruby"]     { background: radial-gradient(circle at 40% 35%, #f17285, #b41530 55%, #5a0612 100%); }
  .swatch[data-style="citrine"]  { background: radial-gradient(circle at 40% 35%, #ffd76b, #c89018 55%, #6b4906 100%); }

  /* TOP-RIGHT group (fullscreen + reset) */
  .top-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    width: 32px;
    height: 32px;
    background: linear-gradient(180deg, #2a1f12, #0f0a06);
    color: var(--gold);
    border: 1px solid rgba(232,199,114,0.45);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    box-shadow:
      inset 0 1px 0 rgba(232,199,114,0.18),
      0 2px 6px rgba(0,0,0,0.6);
    transition: filter 0.15s ease, transform 0.08s ease;
  }
  .icon-btn:hover { filter: brightness(1.2); }
  .icon-btn:active { transform: translateY(1px); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* RESET ALL BUTTON */
  .reset-all {
    display: flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(180deg, #2a1f12, #0f0a06);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: 1px solid rgba(232,199,114,0.45);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(232,199,114,0.18),
      0 2px 6px rgba(0,0,0,0.6);
    transition: filter 0.15s ease, transform 0.08s ease;
  }
  .reset-all:hover { filter: brightness(1.2); }
  .reset-all:active { transform: translateY(1px); }
  .reset-all svg { width: 14px; height: 14px; }

  /* ============ COUNTERS GRID ============ */
  .counters {
    position: fixed;
    top: 56px; bottom: 0; left: 0; right: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px 12px 14px;
  }
  /* Portrait fallback */
  @media (orientation: portrait) {
    .counters {
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: max-content;
      align-content: start;
      overflow-y: auto;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
    /* Shrink panel content in portrait so the +/- row never gets clipped
       on smaller phones (browser chrome eats a lot of vertical space). */
    .icon-frame {
      width: clamp(44px, 8vh, 60px);
      height: clamp(44px, 8vh, 60px);
      margin: 6px auto 4px;
    }
    .count-display {
      height: clamp(40px, 7vh, 54px);
      font-size: clamp(22px, 4.6vh, 32px);
      padding: 0 16px;
      min-width: clamp(60px, 14vw, 100px);
    }
    .count-btn {
      width: clamp(34px, 5.5vh, 42px);
      height: clamp(34px, 5.5vh, 42px);
      font-size: 20px;
    }
    /* In portrait, reset button collapses to a large circular icon-only tap target */
    .reset-all {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      padding: 0;
      justify-content: center;
      gap: 0;
    }
    .reset-all span { display: none; }
    .reset-all svg { width: 20px; height: 20px; }
    /* Match fullscreen button size in portrait for visual balance */
    .icon-btn { width: 44px; height: 44px; border-radius: 50%; }
    .icon-btn svg { width: 20px; height: 20px; }
  }

  /* ============ PANEL ============ */
  .panel {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    isolation: isolate;
    background: var(--panel-base);
    border: 2px solid var(--lead);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.10),
      inset 0 0 30px rgba(0,0,0,0.55),
      0 10px 22px rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 8px 8px 10px;
    transition: background 0.6s ease;
  }

  .panel .glass {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0.95;
    pointer-events: none;
  }
  .panel .sheen {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse at 30% 10%, rgba(255,255,255,0.22), transparent 45%),
      radial-gradient(ellipse at 80% 95%, rgba(0,0,0,0.45), transparent 55%);
    pointer-events: none;
  }
  .panel .vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .panel > * { position: relative; z-index: 3; }

  /* PANEL recipe is driven by selected background */
  body[data-bg="amethyst"] .panel {
    --panel-base: linear-gradient(155deg, #2a0c4a 0%, #5a248c 35%, #7a3ec0 55%, #20083a 100%);
    --panel-accent: #d8b8ff;
    --panel-accent-dark: #1a0530;
  }
  body[data-bg="sapphire"] .panel {
    --panel-base: linear-gradient(155deg, #061c44 0%, #1c4a8e 35%, #3a82d2 55%, #08183a 100%);
    --panel-accent: #aed1ff;
    --panel-accent-dark: #04122a;
  }
  body[data-bg="ruby"] .panel {
    --panel-base: linear-gradient(155deg, #4a0610 0%, #a31226 35%, #d8324b 55%, #4a0a14 100%);
    --panel-accent: #ffb0b8;
    --panel-accent-dark: #3a060c;
  }
  body[data-bg="citrine"] .panel {
    --panel-base: linear-gradient(155deg, #6b4d0c 0%, #b8881b 35%, #e8b73a 55%, #7d5a10 100%);
    --panel-accent: #ffe28a;
    --panel-accent-dark: #5a3e08;
  }

  /* HEADER strip on each panel */
  .panel-label {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.28em;
    color: var(--panel-accent);
    text-shadow:
      0 1px 0 rgba(0,0,0,0.6),
      0 0 10px rgba(0,0,0,0.6);
    padding: 4px 8px;
    border-top: 1px solid rgba(255,255,255,0.18);
    border-bottom: 1px solid rgba(0,0,0,0.5);
    background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.55));
    width: 100%;
    border-radius: 3px;
    white-space: nowrap;
  }

  /* ICON medallion — colored per counter (NOT per bg style) */
  .icon-frame {
    margin: 8px auto 6px;
    width: clamp(56px, 11vh, 78px);
    height: clamp(56px, 11vh, 78px);
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 28%, rgba(255,255,255,0.22), rgba(0,0,0,0.45) 70%),
      var(--ico-bg);
    border: 2px solid rgba(0,0,0,0.55);
    box-shadow:
      inset 0 -4px 10px rgba(0,0,0,0.55),
      inset 0 2px 4px rgba(255,255,255,0.18),
      0 3px 8px rgba(0,0,0,0.5),
      0 0 0 1px var(--ico-ring) inset;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .icon-frame svg { width: 64%; height: 64%; }

  /* per-counter inner medallion colors (fixed regardless of bg) */
  .panel[data-counter="dinero"] { --ico-bg: radial-gradient(circle at 35% 30%, #c89018 0%, #6b4906 80%); --ico-ring: rgba(255,220,120,0.4); --num-color: #ffe28a; }
  .panel[data-counter="vida"]   { --ico-bg: radial-gradient(circle at 35% 30%, #1f3a22 0%, #0a1a0d 80%); --ico-ring: rgba(120,220,140,0.5); --num-color: #b8ffc8; }
  .panel[data-counter="dano"]   { --ico-bg: radial-gradient(circle at 35% 30%, #4a0610 0%, #1a0306 80%); --ico-ring: rgba(255,120,130,0.5); --num-color: #ffb0b8; }
  .panel[data-counter="mision"] { --ico-bg: radial-gradient(circle at 35% 30%, #6b5614 0%, #2a2008 80%); --ico-ring: rgba(255,220,140,0.45); --num-color: #ffe7a8; }
  .panel[data-counter="atium"]  { --ico-bg: radial-gradient(circle at 35% 28%, #f4f6f9 0%, #b8c0c8 60%, #6e7a85 100%); --ico-ring: rgba(255,255,255,0.7); --num-color: #e6ebf0; }

  /* ============ COUNTER ROW ============ */
  .counter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-top: auto;
    width: 100%;
  }
  .count-btn {
    flex: 0 0 auto;
    width: clamp(34px, 6.5vh, 44px);
    height: clamp(34px, 6.5vh, 44px);
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.6);
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.35), transparent 55%),
      linear-gradient(180deg, var(--panel-accent) 0%, var(--panel-accent-dark) 100%);
    color: #0a0604;
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    box-shadow:
      inset 0 -3px 5px rgba(0,0,0,0.4),
      inset 0 2px 2px rgba(255,255,255,0.4),
      0 3px 7px rgba(0,0,0,0.5);
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.6s ease;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0 0 2px 0;
  }
  .count-btn.reset { font-size: 14px; padding: 0; }
  .count-btn.reset svg { width: 50%; height: 50%; color: #0a0604; }
  .count-btn:hover { filter: brightness(1.1); }
  .count-btn:active {
    transform: translateY(2px);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.4);
  }

  .count-display {
    margin-top: auto;
    margin-bottom: 0;
    min-width: clamp(72px, 14vw, 110px);
    padding: 0 20px;
    height: clamp(48px, 9vh, 66px);
    border-radius: 8px;
    background: linear-gradient(180deg, #050302 0%, #100905 100%);
    border: 2px solid rgba(0,0,0,0.7);
    box-shadow:
      inset 0 3px 8px rgba(0,0,0,0.85),
      inset 0 -1px 0 rgba(255,255,255,0.05),
      0 2px 3px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(28px, 6vh, 42px);
    color: var(--num-color);
    text-shadow: 0 0 10px var(--num-color), 0 0 22px rgba(255,255,255,0.12);
  }

  /* Per-panel reset row */
  .panel-reset {
    margin-top: 6px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 4px;
    color: var(--ink-dim);
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 3px 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .panel-reset:hover { color: var(--ink); }
  .panel-reset svg { width: 9px; height: 9px; }

  /* Pulse for heart-equivalent (green cross) */
  @keyframes softPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  .icon-pulse { animation: softPulse 1.8s ease-in-out infinite; transform-origin: center; }

  /* Toast */
  .toast {
    position: fixed;
    top: 56px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(8,5,3,0.92);
    border: 1px solid rgba(232,199,114,0.5);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

    <!-- ATIUM: stylized symbol — circle with offset dot + crossed daggers -->
    <symbol id="ico-atium" viewBox="0 0 64 64">
      <g fill="#0a0c10" stroke="#0a0c10" stroke-width="1.4" stroke-linejoin="round">
        <!-- the ring -->
        <path d="M32 14 C 22 14, 14 22, 14 32 C 14 42, 22 50, 32 50 C 42 50, 50 42, 50 32 C 50 22, 42 14, 32 14 Z
                 M32 18 C 39.7 18, 46 24.3, 46 32 C 46 39.7, 39.7 46, 32 46 C 24.3 46, 18 39.7, 18 32 C 18 24.3, 24.3 18, 32 18 Z"

        <!-- top-left dot (the 'metal bead') -->

<div class="toast" id="toast">Contadores reiniciados</div>

<script>
  // ---------- Audio (synthesized via Web Audio API, no files needed) ----------
  let audioCtx = null;
  function getAudio() {
    if (audioCtx) return audioCtx;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    audioCtx = new Ctx();
    return audioCtx;
  }
  function clickSound() {
    const ctx = getAudio(); if (!ctx) return;
    const t = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(900, t);
    o.frequency.exponentialRampToValueAtTime(420, t + 0.05);
    g.gain.setValueAtTime(0.14, t);
    g.gain.exponentialRampToValueAtTime(0.0005, t + 0.08);
    o.connect(g).connect(ctx.destination);
    o.start(t);
    o.stop(t + 0.09);
  }
  function sweepSound() {
    const ctx = getAudio(); if (!ctx) return;
    const t = ctx.currentTime;
    const dur = 0.32;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.setValueAtTime(4500, t);
    f.frequency.exponentialRampToValueAtTime(380, t + dur);
    f.Q.value = 6;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.32, t);
    g.gain.exponentialRampToValueAtTime(0.0005, t + dur);
    src.connect(f).connect(g).connect(ctx.destination);
    src.start(t);
    src.stop(t + dur + 0.02);
  }

  // ---------- Background tile builder ----------
  function buildTileURI(hex) {
    const svg = `
      <svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'>
        <defs>
          <radialGradient id='g' cx='50%' cy='40%' r='70%'>
            <stop offset='0%'  stop-color='${hex}' stop-opacity='0.60'/>
            <stop offset='60%' stop-color='${hex}' stop-opacity='0.25'/>
            <stop offset='100%' stop-color='#000' stop-opacity='0.55'/>
          </radialGradient>
        </defs>
        <rect width='160' height='160' fill='url(%23g)'/>
        <g stroke='rgba(0,0,0,0.85)' stroke-width='2' fill='none'>
          <path d='M80 0 L160 80 L80 160 L0 80 Z'/>
          <path d='M0 0 L80 80 L0 160 Z'/>
          <path d='M160 0 L80 80 L160 160 Z'/>
          <circle cx='80' cy='80' r='30'/>
          <path d='M80 50 L80 110 M50 80 L110 80 M59 59 L101 101 M101 59 L59 101'/>
          <circle cx='40'  cy='40'  r='12'/>
          <circle cx='120' cy='40'  r='12'/>
          <circle cx='40'  cy='120' r='12'/>
          <circle cx='120' cy='120' r='12'/>
        </g>
        <g fill='rgba(255,255,255,0.08)'><circle cx='80' cy='80' r='6'/></g>
      </svg>`;
    return "url(\"data:image/svg+xml;utf8," + svg.replace(/#/g, '%23').replace(/\n\s*/g, ' ') + "\")";
  }

  const STYLES = {
    amethyst: { tint: '#7a3ec0', base: '#1c0e2a' },
    sapphire: { tint: '#2a6cc8', base: '#08152c' },
    ruby:     { tint: '#c41f3a', base: '#260a10' },
    citrine:  { tint: '#dca52a', base: '#2b1f06' },
  };

  function applyStyle(name) {
    const s = STYLES[name];
    document.body.setAttribute('data-bg', name);
    document.body.style.setProperty('--bg-tile', buildTileURI(s.tint));
    document.body.style.setProperty('--bg-color', s.base);
    document.querySelectorAll('.swatch').forEach(sw => {
      sw.classList.toggle('active', sw.dataset.style === name);
    });
    localStorage.setItem('mb-bg', name);
  }

  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => applyStyle(sw.dataset.style));
  });

  // ---------- Counters ----------
  const STORE_KEY = 'mb-counters-v2';
  const DEFAULTS  = { dinero: 0, vida: 0, dano: 0, mision: 0, atium: 0 };

  function loadCounts() {
    try { return { ...DEFAULTS, ...(JSON.parse(localStorage.getItem(STORE_KEY)) || {}) }; }
    catch { return { ...DEFAULTS }; }
  }
  function saveCounts(c) { localStorage.setItem(STORE_KEY, JSON.stringify(c)); }

  let counts = loadCounts();
  const displays = {};

  function render() {
    for (const [id, val] of Object.entries(counts)) {
      if (displays[id]) displays[id].textContent = val;
    }
  }

  document.querySelectorAll('.panel').forEach(p => {
    const id = p.dataset.counter;
    displays[id] = p.querySelector('[data-display]');
    p.querySelectorAll('.count-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const delta = btn.dataset.act === 'inc' ? 1 : -1;
        counts[id] = Math.max(0, counts[id] + delta);
        displays[id].textContent = counts[id];
        saveCounts(counts);
        clickSound();
        displays[id].animate(
          [{ transform: 'scale(1)' }, { transform: 'scale(1.12)' }, { transform: 'scale(1)' }],
          { duration: 200, easing: 'ease-out' }
        );
      });
    });
  });
  render();

  // ---------- Reset all ----------
  const toast = document.getElementById('toast');
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.classList.remove('show'), 1400);
  }

  document.getElementById('resetAll').addEventListener('click', () => {
    counts = { ...DEFAULTS };
    saveCounts(counts);
    render();
    sweepSound();
    // ripple animation across all displays
    Object.values(displays).forEach(d => {
      d.animate(
        [{ transform: 'scale(1)', filter: 'brightness(1)' },
         { transform: 'scale(0.92)', filter: 'brightness(1.6)' },
         { transform: 'scale(1)', filter: 'brightness(1)' }],
        { duration: 360, easing: 'ease-out' }
      );
    });
    showToast('Turno reiniciado');
  });

  // ---------- Fullscreen toggle ----------
  const fsBtn = document.getElementById('fsToggle');
  const fsUse = fsBtn.querySelector('use');
  function isFs() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }
  function syncFsIcon() {
    fsUse.setAttribute('href', isFs() ? '#ico-fs-exit' : '#ico-fs-enter');
  }
  fsBtn.addEventListener('click', async () => {
    try {
      if (!isFs()) {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) await req.call(el);
      } else {
        const exit = document.exitFullscreen || document.webkitExitFullscreen;
        if (exit) await exit.call(document);
      }
    } catch (_) {}
  });
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);

  // Initialize background from storage or default
  applyStyle(localStorage.getItem('mb-bg') || 'amethyst');

  // Try to lock to landscape if the API exists (best-effort; will fail silently on iOS)
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
</script>
